<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva de Recursos — Área do Professor</title>
<style>
  :root{
    --quadro: #1f3d2e; --quadro-2: #274a37;
    --giz: #f3efe0; --giz-dim: #cfd6c8;
    --papel: #f6f1e3; --papel-2: #efe7d0; --linha: #d8cda8;
    --amarelo: #e8b94d; --vermelho: #c0533e; --verde-ok: #4c7a52;
    --tinta: #2a2620; --sombra: rgba(20,30,20,.25); --radius: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--quadro);
    background-image: radial-gradient(circle at 10% 0%, rgba(255,255,255,.04), transparent 40%),
                       radial-gradient(circle at 90% 80%, rgba(255,255,255,.03), transparent 45%);
    font-family: 'Trebuchet MS','Segoe UI',Verdana,sans-serif;
    color: var(--tinta); min-height:100vh; padding: 28px 16px 60px;
  }
  .wrap{max-width:1180px;margin:0 auto;}
  header.board{ text-align:center; padding: 22px 18px 24px; margin-bottom: 22px; }
  .chalk-title{
    font-family:'Brush Script MT',cursive; font-size: clamp(2.2rem,6vw,3.4rem);
    color: var(--giz); text-shadow: 0 0 6px rgba(255,255,255,.18); margin:0; transform: rotate(-1deg);
  }
  .chalk-sub{ color: var(--giz-dim); font-size:.9rem; letter-spacing:3px; text-transform:uppercase; margin-top:6px;}
  .chalk-rule{ width:200px; height:2px; margin:14px auto 0;
    background: repeating-linear-gradient(90deg, var(--giz-dim) 0 8px, transparent 8px 14px); opacity:.5;}
  .badge-area{
    display:inline-block; margin-top:14px; background: rgba(255,255,255,.08); color: var(--giz-dim);
    font-size:.72rem; letter-spacing:1px; text-transform:uppercase; padding:5px 12px; border-radius:999px;
    border:1px solid rgba(255,255,255,.15);
  }

  .card{
    background: var(--papel); border-radius: var(--radius);
    box-shadow: 0 10px 24px var(--sombra), 0 1px 0 rgba(255,255,255,.4) inset;
    padding:22px; margin-bottom:22px; border:1px solid var(--linha); position:relative;
  }
  .card::before{
    content:""; position:absolute; top:0; left:24px; right:24px; height:10px;
    background: repeating-linear-gradient(90deg, transparent 0 18px, rgba(192,83,62,.18) 18px 20px);
  }

  label{ font-weight:700; font-size:.85rem; text-transform:uppercase; letter-spacing:.5px; color:#5a5240; display:block; margin-bottom:5px;}
  input[type=text]{
    width:100%; padding:10px 12px; border:1.5px solid var(--linha); border-radius:7px;
    background:#fffdf7; font-size:1rem; font-family:inherit; color: var(--tinta);
  }
  input[type=text]:focus{ outline:2px solid var(--amarelo); border-color: var(--amarelo); }

  .resource-pills{ display:flex; flex-wrap:wrap; gap:10px; margin-top:4px;}
  .pill{
    padding:9px 16px; border-radius:999px; border:1.5px solid var(--linha);
    background:#fffdf7; cursor:pointer; font-size:.9rem; font-weight:600; display:flex; align-items:center; gap:6px; position:relative;
  }
  .pill.active{ background: var(--quadro); color: var(--giz); border-color: var(--quadro); }
  .pill.blocked{ border-color: var(--vermelho); }
  .pill .ico{ font-size:1.05rem; }
  .pill .dot{ width:8px; height:8px; border-radius:50%; background: var(--vermelho); display:inline-block; }

  h2.section-title{ font-size:1.1rem; margin:0 0 14px; color: var(--tinta); display:flex; align-items:center; gap:10px; }
  h2.section-title .tag{
    background: var(--quadro); color: var(--giz); font-size:.7rem; padding:3px 9px;
    border-radius:5px; letter-spacing:1px; text-transform:uppercase;
  }

  .alert-problema{
    background: #fbe7e2; border: 1.5px solid var(--vermelho); color:#7a2c1c;
    border-radius:8px; padding:14px 16px; margin-bottom:18px; font-size:.9rem;
    display:flex; gap:10px; align-items:flex-start;
  }
  .alert-problema .ico{ font-size:1.3rem; line-height:1; }
  .alert-problema strong{ display:block; margin-bottom:2px; }

  .turno-label{
    font-weight:800; font-size:.75rem; text-transform:uppercase; letter-spacing:1.5px;
    color:#8a7e5e; margin:18px 0 8px; display:flex; align-items:center; gap:8px;
  }
  .turno-label::after{ content:""; flex:1; height:1px; background: var(--linha); }

  table.grid{
    width:100%; border-collapse: collapse; background:#fffdf7; border-radius:8px;
    overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,.06);
  }
  table.grid th, table.grid td{ border:1px solid var(--linha); padding:0; text-align:center; }
  table.grid th{ background: var(--quadro-2); color: var(--giz); font-size:.78rem; padding:9px 4px; font-weight:700; letter-spacing:.4px;}
  table.grid th.period-col{ background: var(--quadro); width:64px; }
  .slot{ min-height:52px; padding:7px 6px; cursor:pointer; font-size:.78rem; line-height:1.25; transition: background .12s ease; position:relative; }
  .slot.free{ background:#fbf8ee; color:#9a9272; }
  .slot.free:hover{ background:#fdf0cf; }
  .slot.free::after{ content:"+ reservar"; opacity:0; font-size:.68rem; color:#a98a2c; }
  .slot.free:hover::after{ opacity:1; }
  .slot.taken{ background:#e9f1e6; color:#2c4a2f; font-weight:700; }
  .slot.taken.mine{ background: var(--amarelo); color:#4a3a10; cursor:pointer; }
  .slot.taken:not(.mine){ cursor:default; }
  .slot.taken .who{ display:block; font-weight:700; }
  .slot.taken .hint{ display:block; font-size:.62rem; font-weight:400; opacity:.7; margin-top:2px;}
  .slot.blocked{ background: repeating-linear-gradient(45deg, #f3d9d4, #f3d9d4 6px, #ecc6bf 6px 12px); color:#8a2f1e; cursor:not-allowed; font-weight:700; }

  .legend{ display:flex; gap:18px; flex-wrap:wrap; margin:14px 0 4px; font-size:.8rem; color:#6b6450;}
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .swatch{ width:14px; height:14px; border-radius:3px; display:inline-block; border:1px solid var(--linha); }

  .toast{
    position:fixed; bottom:24px; left:50%; transform: translateX(-50%);
    background: var(--quadro); color: var(--giz); padding:12px 22px; border-radius:8px;
    box-shadow:0 6px 18px rgba(0,0,0,.3); font-size:.9rem; z-index:999; opacity:0;
    transition: opacity .25s, transform .25s; pointer-events:none;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }
  .toast.err{ background: var(--vermelho); }

  @media (max-width:720px){
    .slot{ font-size:.68rem; padding:5px 3px; min-height:42px;}
    table.grid th{ font-size:.65rem; padding:6px 2px;}
    .chalk-title{ font-size:1.9rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="board">
    <p class="chalk-title">Mural de Horários</p>
    <p class="chalk-sub">Reserva de recursos pedagógicos</p>
    <div class="chalk-rule"></div>
    <div class="badge-area">👩‍🏫 Área do Professor</div>
  </header>

  <div class="card">
    <h2 class="section-title">Quem está reservando? <span class="tag">passo 1</span></h2>
    <div class="form-row">
      <label for="prof-name">Nome do professor(a)</label>
      <input type="text" id="prof-name" placeholder="Ex: Maria Silva" autocomplete="off">
    </div>
    <h2 class="section-title" style="margin-top:16px;">Qual recurso? <span class="tag">passo 2</span></h2>
    <div class="resource-pills" id="resource-pills"></div>
  </div>

  <div class="card" id="prof-grid-card">
    <h2 class="section-title" id="prof-grid-title">Horários disponíveis <span class="tag">passo 3</span></h2>
    <div id="alert-area"></div>
    <div class="legend">
      <span><span class="swatch" style="background:#fbf8ee"></span> Livre</span>
      <span><span class="swatch" style="background:#e9f1e6"></span> Ocupado por outro professor</span>
      <span><span class="swatch" style="background:var(--amarelo)"></span> Sua reserva (clique para cancelar)</span>
      <span><span class="swatch" style="background:#f3d9d4"></span> Indisponível (problema técnico)</span>
    </div>
    <div id="prof-grid-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, getDocs, getDoc, setDoc, deleteDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi62yDjL4ayE3JoCP-m8dDpyEb1jIiZis",
  authDomain: "agendamento-escolar-86843.firebaseapp.com",
  projectId: "agendamento-escolar-86843",
  storageBucket: "agendamento-escolar-86843.firebasestorage.app",
  messagingSenderId: "339474137748",
  appId: "1:339474137748:web:94412cb05e597f7e9cea81"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const reservasCol = collection(db, "reservas");
const statusCol = collection(db, "status");

const RESOURCES = [
  {id:'informatica', label:'Informática', icon:'💻'},
  {id:'tablets', label:'Tablets', icon:'📱'},
  {id:'tela', label:'Tela Interativa', icon:'🖥️'},
  {id:'biblioteca', label:'Biblioteca', icon:'📚'},
  {id:'video', label:'Sala de Vídeo', icon:'🎬'},
];
const DAYS = ['Segunda','Terça','Quarta','Quinta','Sexta'];
const TURNOS = ['Manhã','Tarde'];
const PERIODOS = [1,2,3,4,5];

let selectedResource = RESOURCES[0].id;
let reservations = {};
let statuses = {}; // resourceId -> {blocked, reason, ts}

function slotKey(resource, day, turno, periodo){ return `${resource}__${day}__${turno}__${periodo}`; }
function statusKey(resource){ return resource; }

async function loadAll(){
  try{
    const snap = await getDocs(reservasCol);
    reservations = {};
    snap.forEach(d=>{ reservations[d.id] = d.data(); });
  }catch(e){ console.error('Erro ao carregar reservas', e); }

  try{
    const snap = await getDocs(statusCol);
    statuses = {};
    snap.forEach(d=>{ statuses[d.id] = d.data(); });
  }catch(e){ console.error('Erro ao carregar status', e); }
}

function showToast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(()=>{ t.className = 'toast'; }, 2800);
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderResourcePills(){
  const c = document.getElementById('resource-pills');
  c.innerHTML = '';
  RESOURCES.forEach(r=>{
    const st = statuses[r.id];
    const p = document.createElement('div');
    p.className = 'pill' + (r.id===selectedResource ? ' active' : '') + (st && st.blocked ? ' blocked' : '');
    p.innerHTML = `<span class="ico">${r.icon}</span> ${r.label}` + (st && st.blocked ? ' <span class="dot"></span>' : '');
    p.onclick = ()=>{ selectedResource = r.id; renderProfessorView(); };
    c.appendChild(p);
  });
}

function renderAlert(){
  const area = document.getElementById('alert-area');
  const st = statuses[selectedResource];
  if(st && st.blocked){
    area.innerHTML = `<div class="alert-problema">
      <span class="ico">⚠️</span>
      <div><strong>Recurso indisponível: ${RESOURCES.find(r=>r.id===selectedResource).label}</strong>
      Motivo informado pelo responsável: ${escapeHtml(st.reason || 'Problema técnico')}.
      Não é possível reservar este recurso até a liberação.</div>
    </div>`;
  } else {
    area.innerHTML = '';
  }
}

function buildGrid(container, resourceId){
  container.innerHTML = '';
  const st = statuses[resourceId];
  const isBlocked = st && st.blocked;

  TURNOS.forEach(turno=>{
    const lbl = document.createElement('div');
    lbl.className = 'turno-label';
    lbl.textContent = turno;
    container.appendChild(lbl);

    const table = document.createElement('table');
    table.className = 'grid';
    const thead = document.createElement('thead');
    const trh = document.createElement('tr');
    trh.innerHTML = '<th class="period-col">Aula</th>' + DAYS.map(d=>`<th>${d}</th>`).join('');
    thead.appendChild(trh);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    PERIODOS.forEach(periodo=>{
      const tr = document.createElement('tr');
      const th = document.createElement('th');
      th.className = 'period-col';
      th.textContent = periodo + 'º';
      tr.appendChild(th);

      DAYS.forEach(day=>{
        const td = document.createElement('td');
        const key = slotKey(resourceId, day, turno, periodo);
        const res = reservations[key];
        const div = document.createElement('div');

        if(isBlocked){
          div.className = 'slot blocked';
          div.innerHTML = '🚫 indisponível';
        } else if(res){
          div.className = 'slot taken';
          const profName = (document.getElementById('prof-name').value || '').trim();
          const isMine = res.professor && profName && res.professor.toLowerCase() === profName.toLowerCase();
          if(isMine) div.className += ' mine';
          div.innerHTML = `<span class="who">${escapeHtml(res.professor)}</span><span class="hint">${isMine ? 'clique p/ cancelar' : 'ocupado'}</span>`;
          if(isMine) div.onclick = ()=> cancelReservation(key);
        } else {
          div.className = 'slot free';
          div.innerHTML = '&nbsp;';
          div.onclick = ()=> makeReservation(resourceId, day, turno, periodo);
        }
        td.appendChild(div);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  });
}

async function makeReservation(resourceId, day, turno, periodo){
  const nameInput = document.getElementById('prof-name');
  const profName = nameInput.value.trim();
  if(!profName){
    showToast('Digite seu nome antes de reservar.', true);
    nameInput.focus();
    return;
  }
  await loadAll();
  const st = statuses[resourceId];
  if(st && st.blocked){
    showToast('Este recurso está indisponível por problema técnico.', true);
    renderProfessorView();
    return;
  }
  const key = slotKey(resourceId, day, turno, periodo);
  if(reservations[key]){
    showToast('Esse horário acabou de ser reservado por outro professor.', true);
    renderProfessorView();
    return;
  }
  const value = {professor: profName, resource: resourceId, day, turno, periodo, ts: Date.now()};
  try{
    await setDoc(doc(reservasCol, key), value);
    reservations[key] = value;
    showToast(`Reservado: ${RESOURCES.find(r=>r.id===resourceId).label} — ${day}, ${turno}, ${periodo}º horário.`);
    renderProfessorView();
  }catch(e){
    console.error(e);
    showToast('Erro ao reservar. Tente novamente.', true);
  }
}

async function cancelReservation(key){
  try{
    await deleteDoc(doc(reservasCol, key));
    delete reservations[key];
    showToast('Reserva cancelada.');
    renderProfessorView();
  }catch(e){
    console.error(e);
    showToast('Erro ao cancelar.', true);
  }
}

function renderProfessorView(){
  renderResourcePills();
  renderAlert();
  document.getElementById('prof-grid-title').innerHTML =
    `Horários disponíveis — ${RESOURCES.find(r=>r.id===selectedResource).label} <span class="tag">passo 3</span>`;
  buildGrid(document.getElementById('prof-grid-container'), selectedResource);
}

document.getElementById('prof-name').addEventListener('input', renderProfessorView);

async function init(){
  await loadAll();
  renderProfessorView();
  onSnapshot(reservasCol, (snap)=>{
    reservations = {};
    snap.forEach(d=>{ reservations[d.id] = d.data(); });
    renderProfessorView();
  });
  onSnapshot(statusCol, (snap)=>{
    statuses = {};
    snap.forEach(d=>{ statuses[d.id] = d.data(); });
    renderProfessorView();
  });
}
init();
</script>
</body>
</html>
